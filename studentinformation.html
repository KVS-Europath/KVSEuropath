<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KVS Europath Enquiry</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg,#0b0f2f,#1c3faa,#3a7bd5);
    color:white;
}

.container{
    max-width:600px;
    margin:50px auto;
    padding:25px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    border-radius:15px;
}

h1{
    text-align:center;
}

input, select, textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    font-family:Poppins;
}

button{
    width:100%;
    padding:12px;
    background:#ff9800;
    border:none;
    border-radius:25px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    transform:scale(1.03);
}

#status{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>KVS Europath 🎓</h1>
<p style="text-align:center;">Student Enquiry Form</p>

<form id="contact-form">

<input type="text" id="name" placeholder="Full Name" required>

<input type="email" id="email" placeholder="Email Address" required>

<input type="tel" id="phone" placeholder="Phone Number" required>

<select id="country" required>
    <option value="">Select Country</option>
    <option>Germany</option>
    <option>France</option>
    <option>Italy</option>
    <option>Netherlands</option>
</select>

<select id="level" required>
    <option value="">Select Study Level</option>
    <option>Bachelor’s</option>
    <option>Master’s</option>
</select>

<textarea id="message" placeholder="Your Message"></textarea>

<button type="submit">Submit Enquiry</button>

</form>

<p id="status"></p>

</div>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
emailjs.init("dcLIb5vo3iDxsSKET"); // PUBLIC KEY

document.getElementById("contact-form").addEventListener("submit", function(e){
    e.preventDefault();

    emailjs.send("service_u2lnug7", "template_syhqwr3", {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        country: document.getElementById("country").value,
        level: document.getElementById("level").value,
        message: document.getElementById("message").value
    });

    document.getElementById("status").innerHTML =
    "✅ Thanks for responding! KVS Europath will contact you soon.";
});
</script>

</body>
</html>
